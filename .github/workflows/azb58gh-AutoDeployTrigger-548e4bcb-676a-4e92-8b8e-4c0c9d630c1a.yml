name: Trigger auto deployment for azb58gh

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ azb58containerapp ]
    paths:
    - '**'
    - '.github/workflows/azb58gh-AutoDeployTrigger-548e4bcb-676a-4e92-8b8e-4c0c9d630c1a.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZB58GH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZB58GH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZB58GH_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: azb58acr.azurecr.io
          registryUsername: ${{ secrets.AZB58GH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZB58GH_REGISTRY_PASSWORD }}
          containerAppName: azb58gh
          resourceGroup: AZB58ACR
          imageToBuild: azb58acr.azurecr.io/azb58gh:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


