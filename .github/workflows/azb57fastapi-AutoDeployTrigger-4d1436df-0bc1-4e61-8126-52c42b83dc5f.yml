name: Trigger auto deployment for azb57fastapi

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ azb57containerapp ]
    paths:
    - '**'
    - '.github/workflows/azb57fastapi-AutoDeployTrigger-4d1436df-0bc1-4e61-8126-52c42b83dc5f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZB57FASTAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZB57FASTAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZB57FASTAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: azb5acr.azurecr.io
          registryUsername: ${{ secrets.AZB57FASTAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZB57FASTAPI_REGISTRY_PASSWORD }}
          containerAppName: azb57fastapi
          resourceGroup: AZB57IAAC
          #imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          imageToBuild: azb5acr.azurecr.io/azb57fastapi:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


